<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuenta regresiva 🎤</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --fondo-1: #2b1a4a;
    --fondo-2: #5a2f7a;
    --fondo-3: #c9a8e8;
    --rosa: #ff8fab;
    --dorado: #ffd28a;
    --texto: #2b1a4a;
    --texto-claro: #f4e9ff;
    --crema: #ffffff;
    --sombra: 0 16px 36px rgba(43, 26, 74, 0.35);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; min-height:100vh;
    font-family:'Nunito', sans-serif;
    color: var(--texto-claro);
    background: radial-gradient(circle at 20% 0%, var(--fondo-2) 0%, var(--fondo-1) 60%);
    overflow-x:hidden;
  }

  .fondo-decor{
    position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
  }
  .nota{
    position:absolute; bottom:-10%;
    font-size:1.5rem; opacity:0.3; color: var(--dorado);
    animation: flotar linear infinite;
  }
  @keyframes flotar{
    0%{ transform: translateY(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.35; }
    90%{ opacity:0.35; }
    100%{ transform: translateY(-110vh) rotate(20deg); opacity:0; }
  }

  .app{
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }

  .tarjeta{
    background: var(--crema);
    color: var(--texto);
    border-radius: 28px;
    box-shadow: var(--sombra);
    padding: 38px 28px;
    max-width: 440px;
    width:100%;
    text-align:center;
    position:relative;
  }

  .disco{
    width: 90px; height:90px;
    margin: 0 auto 14px;
    border-radius:50%;
    background: repeating-radial-gradient(circle, #2b1a4a 0 2px, #4a2f6a 2px 6px);
    position:relative;
    box-shadow: 0 10px 24px rgba(43,26,74,0.3);
    animation: girar 6s linear infinite;
  }
  .disco::after{
    content:'';
    position:absolute; top:50%; left:50%;
    width:18px; height:18px;
    background: var(--dorado);
    border-radius:50%;
    transform: translate(-50%,-50%);
  }
  @keyframes girar{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(360deg); }
  }

  h1{
    font-family:'Playfair Display', serif;
    font-size: 1.3rem;
    line-height:1.4;
    margin: 0 0 4px;
  }
  .evento{
    font-weight:800;
    color: var(--rosa);
  }
  p.detalle{
    font-size:0.9rem;
    color:#6b5a85;
    margin: 2px 0 18px;
  }

  .contador{
    display:flex;
    justify-content:center;
    gap: 10px;
    margin: 10px 0 18px;
  }
  .unidad{
    background: linear-gradient(160deg, #f3e9ff, #fbeaf4);
    border-radius: 16px;
    padding: 12px 6px;
    width: 68px;
  }
  .unidad .num{
    font-family:'Playfair Display', serif;
    font-size: 1.7rem;
    font-weight:700;
    color: var(--texto);
    display:block;
  }
  .unidad .label{
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color:#8a7aa3;
  }

  .mensaje{
    font-size: 0.95rem;
    color: var(--texto);
    background: #fdf3ff;
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 18px;
    min-height: 24px;
  }

  .barra-progreso{
    width:100%;
    height: 10px;
    background:#eee0fa;
    border-radius:999px;
    overflow:hidden;
    margin-bottom: 18px;
  }
  .barra-relleno{
    height:100%;
    background: linear-gradient(90deg, var(--rosa), var(--dorado));
    width:0%;
    transition: width 1s ease;
  }

  button{
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size: 0.95rem;
    border:none;
    border-radius: 999px;
    padding: 13px 26px;
    cursor:pointer;
    width:100%;
    background: linear-gradient(135deg, var(--rosa), #c9a8e8);
    color:white;
    box-shadow: 0 8px 18px rgba(201,168,232,0.4);
    transition: transform 0.15s ease;
  }
  button:hover{ transform: translateY(-2px); }

  .pd{
    font-size:0.78rem;
    color:#9a8ab5;
    margin-top: 14px;
    font-style: italic;
  }

  @media (max-width:380px){
    .unidad{ width: 58px; padding:10px 4px; }
    .unidad .num{ font-size:1.4rem; }
  }
</style>
</head>
<body>

<div class="fondo-decor" id="fondoDecor"></div>

<div class="app">
  <div class="tarjeta">
    <div class="disco"></div>
    <h1>Falta poco para <span class="evento">Harry Styles: Together, Together</span> 🎤</h1>
    <p class="detalle">10 de agosto de 2026 · 9:00 PM<br>Estadio GNP Seguros, Ciudad de México</p>

    <div class="contador">
      <div class="unidad"><span class="num" id="dias">--</span><span class="label">días</span></div>
      <div class="unidad"><span class="num" id="horas">--</span><span class="label">horas</span></div>
      <div class="unidad"><span class="num" id="mins">--</span><span class="label">min</span></div>
      <div class="unidad"><span class="num" id="segs">--</span><span class="label">seg</span></div>
    </div>

    <div class="barra-progreso"><div class="barra-relleno" id="barraRelleno"></div></div>

    <p class="mensaje" id="mensajeDinamico">Cargando...</p>

    <button onclick="agregarCalendario()">Agregar a mi calendario 📅</button>

    <p class="pd">PD: nos vemos cantando hasta quedarnos sin voz 💜</p>
  </div>
</div>

<script>
  // Fecha del evento (hora local del dispositivo)
  const fechaEvento = new Date(2026, 7, 10, 21, 0, 0); // 10 de agosto 2026, 9:00 PM
  const fechaInicio = new Date(); // momento en que se carga la página, para la barra de progreso
  const totalEspera = fechaEvento - fechaInicio;

  const mensajes = [
    { dias: 60, texto: 'Todavía falta, pero ya podemos armar el playlist para el camino 🎶' },
    { dias: 30, texto: '¡Ya es el mes! Hora de pensar qué nos vamos a poner 👀' },
    { dias: 14, texto: 'Dos semanas... ¡esto ya se siente real! 💜' },
    { dias: 7, texto: 'Una semana. Prepara la garganta para cantar 🎤' },
    { dias: 1, texto: '¡Es mañana! No vamos a dormir de la emoción 😆' },
    { dias: 0, texto: '¡HOY ES EL DÍA! Nos vemos en el Estadio GNP Seguros 🎉' }
  ];

  function elegirMensaje(diasRestantes){
    for(const m of mensajes){
      if(diasRestantes <= m.dias) return m.texto;
    }
    return mensajes[0].texto;
  }

  function actualizarContador(){
    const ahora = new Date();
    const diferencia = fechaEvento - ahora;

    if(diferencia <= 0){
      document.getElementById('dias').textContent = '0';
      document.getElementById('horas').textContent = '0';
      document.getElementById('mins').textContent = '0';
      document.getElementById('segs').textContent = '0';
      document.getElementById('mensajeDinamico').textContent = mensajes[mensajes.length - 1].texto;
      document.getElementById('barraRelleno').style.width = '100%';
      return;
    }

    const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
    const mins = Math.floor((diferencia / (1000 * 60)) % 60);
    const segs = Math.floor((diferencia / 1000) % 60);

    document.getElementById('dias').textContent = dias;
    document.getElementById('horas').textContent = horas;
    document.getElementById('mins').textContent = mins;
    document.getElementById('segs').textContent = segs;

    document.getElementById('mensajeDinamico').textContent = elegirMensaje(dias);

    const transcurrido = totalEspera - diferencia;
    const porcentaje = Math.min(100, Math.max(0, (transcurrido / totalEspera) * 100));
    document.getElementById('barraRelleno').style.width = porcentaje + '%';
  }

  actualizarContador();
  setInterval(actualizarContador, 1000);

  // ---------- Descargar evento para el calendario (.ics) ----------
  function formatoICS(fecha){
    const pad = (n) => n.toString().padStart(2, '0');
    return fecha.getUTCFullYear() + pad(fecha.getUTCMonth()+1) + pad(fecha.getUTCDate())
      + 'T' + pad(fecha.getUTCHours()) + pad(fecha.getUTCMinutes()) + pad(fecha.getUTCSeconds()) + 'Z';
  }

  function agregarCalendario(){
    const inicio = fechaEvento;
    const fin = new Date(fechaEvento.getTime() + (3 * 60 * 60 * 1000)); // 3 horas de duración estimada

    const contenidoICS = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'BEGIN:VEVENT',
      'SUMMARY:Harry Styles - Together, Together',
      'LOCATION:Estadio GNP Seguros, Ciudad de México',
      'DESCRIPTION:Nuestra cita en el concierto 💜',
      'DTSTART:' + formatoICS(inicio),
      'DTEND:' + formatoICS(fin),
      'END:VEVENT',
      'END:VCALENDAR'
    ].join('\r\n');

    const blob = new Blob([contenidoICS], { type: 'text/calendar' });
    const enlace = document.createElement('a');
    enlace.href = URL.createObjectURL(blob);
    enlace.download = 'concierto-harry-styles.ics';
    document.body.appendChild(enlace);
    enlace.click();
    document.body.removeChild(enlace);
  }

  // ---------- Notas musicales flotantes de fondo ----------
  const contenedorNotas = document.getElementById('fondoDecor');
  const emojisNota = ['🎵','🎶','💜','✨'];

  function crearNota(){
    const span = document.createElement('span');
    span.className = 'nota';
    span.textContent = emojisNota[Math.floor(Math.random() * emojisNota.length)];
    span.style.left = Math.random() * 100 + 'vw';
    const duracion = 9 + Math.random() * 6;
    span.style.animationDuration = duracion + 's';
    span.style.fontSize = (1 + Math.random() * 1.1) + 'rem';
    contenedorNotas.appendChild(span);
    setTimeout(() => span.remove(), duracion * 1000);
  }

  setInterval(crearNota, 800);
  for(let i = 0; i < 6; i++){ setTimeout(crearNota, i * 300); }
</script>

</body>
</html>
